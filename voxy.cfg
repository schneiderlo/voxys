# voxy Configuration File
# =======================

# Config reload test
[window]
width = 1280
height = 720
fullscreen = false
title = "voxy"

[render]
path = "raycast"
resolution_scale = 1.5
vsync = true
max_fps = 0

[terrain]
# Generated from Terrain Diffusion seed 1234.
heightmap = "data/generated/td_seed_1234_8192.ldh"
# heightmap = "data/Terrain004_8K.ldh"
# heightmap = "data/canyon_8k.ldh"
# Terrain Diffusion native spacing is 30 m, but voxy uses 25 cm voxels.
height_scale = 120.0
cell_scale = 0.25
enable_decorations = true
decoration_spacing_cells = 10
max_tree_instances = 22000
albedo = "data/generated/td_seed_1234_8192_relief.png"
ambient_light = 0.2

[camera]
fov = 60.0
near_plane = 0.1
far_plane = 10000.0
move_speed = 10.0
mouse_sensitivity = 0.0002
# Eye height above ground (scale with terrain for consistent feel)
eye_height = 1.8

[lighting]
sun_direction = [0.4, 0.6, 0.4]
sun_color = [1.0, 0.95, 0.9]
ambient_color = [0.1, 0.12, 0.15]
fog_density = 0.0001
fog_color = [0.6, 0.7, 0.8]

[debug]
show_stats = true
show_wireframe = false
log_level = "info"
enable_validation = true
