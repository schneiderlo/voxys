name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EM_CACHE_FOLDER: 'emsdk-cache'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Cache Emscripten ports
        uses: actions/cache@v4
        with:
          path: ${{ env.EM_CACHE_FOLDER }}
          key: emsdk-${{ runner.os }}-${{ hashFiles('scripts/fetch_deps.sh') }}
          restore-keys: |
            emsdk-${{ runner.os }}-

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: ${{ env.EM_CACHE_FOLDER }}

      - name: Install emdawnwebgpu port
        run: |
          embuilder build emdawnwebgpu

      - name: Cache Third Party
        id: cache-third-party
        uses: actions/cache@v4
        with:
          path: third_party
          key: third-party-${{ runner.os }}-${{ hashFiles('scripts/fetch_deps.sh') }}

      - name: Fetch dependencies
        if: steps.cache-third-party.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/fetch_deps.sh
          ./scripts/fetch_deps.sh

      - name: Configure CMake
        run: |
          emcmake cmake -S . -B build-wasm \
            -DVOXY_BUILD_NATIVE=OFF \
            -DVOXY_BUILD_WASM=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build WASM
        run: |
          cmake --build build-wasm -- -j$(nproc)

      - name: Prepare deployment directory
        run: |
          mkdir -p docs
          
          # Copy web assets
          cp -r web/* docs/
          
          # Copy WASM files from build-wasm/bin
          cp build-wasm/bin/voxy_wasm.js docs/
          cp build-wasm/bin/voxy_wasm.wasm docs/ 2>/dev/null || echo "WASM file not found (may be embedded)"
          cp build-wasm/bin/voxy_wasm.data docs/ 2>/dev/null || echo "DATA file not found"
          
          # Update index.html to use the correct JS file name (voxy_wasm.js)
          # The HTML already references voxy_wasm.js, so this should work as-is
          
          # Create .nojekyll to prevent Jekyll processing
          touch docs/.nojekyll
          
          # Verify and list files
          echo "Files in docs directory:"
          ls -lah docs/
          
          # Verify critical files exist
          if [ ! -f "docs/index.html" ]; then
            echo "ERROR: index.html missing!"
            exit 1
          fi
          if [ ! -f "docs/voxy_wasm.js" ]; then
            echo "ERROR: voxy_wasm.js missing!"
            exit 1
          fi
          echo "✓ All critical files present"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

